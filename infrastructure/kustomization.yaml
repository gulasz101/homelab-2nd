---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CNPG Namespace
  - cnpg/namespace.yaml
  # CNPG Operator
  - cnpg/helm-repository.yaml
  - cnpg/helm-release.yaml
  # Barman Cloud CNPG-I plugin (depends on cert-manager HelmRelease)
  - cnpg/barman-cloud-plugin-manifest.yaml
  # SOPS-encrypted Secret holding the plugin sidecar image reference
  - cnpg/barman-cloud-sidecar-image.sops.yaml
  # Mattermost HelmRepository (needed for HelmRelease in apps)
  - mattermost/helm-repository.yaml
  # Nextcloud HelmRepository (needed for HelmRelease in apps)
  - nextcloud/helm-repository.yaml
  # CoreDNS custom config for resolving OMV .local hostname from pods
  - coredns/coredns-custom-homelab.yaml
  # NVIDIA Device Plugin for GPU scheduling
  - nvidia-device-plugin/namespace.yaml
  - nvidia-device-plugin/serviceaccount.yaml
  - nvidia-device-plugin/runtimeclass.yaml
  - nvidia-device-plugin/configmap.yaml
  - nvidia-device-plugin/helm-repository.yaml
  - nvidia-device-plugin/helm-release.yaml
  # LGTM observability stack
  - observability/namespace.yaml
  - observability/helm-repositories.yaml
  - observability/grafana-admin-credentials.sops.yaml
  - observability/grafana-tunnel-token.sops.yaml
  - observability/loki-minio-creds.sops.yaml
  - observability/prometheus-stack-helm-release.yaml
  - observability/loki-helm-release.yaml
  - observability/tempo-helm-release.yaml
  - observability/grafana-helm-release.yaml
  - observability/opentelemetry-collector-helm-release.yaml
  - observability/cloudflared-grafana-deployment.yaml
  - observability/grafana-tunnel-ingress-configmap.yaml
  # NVIDIA GPU metrics exporter (for older/consumer GPUs)
  - observability/nvidia-gpu-exporter-helm-repository.yaml
  - observability/nvidia-gpu-exporter-helm-release.yaml
  # Grafana dashboards
  - observability/dashboards/homelab-system-load-dashboard-configmap.yaml
  - observability/dashboards/homelab-gpu-power-dashboard-configmap.yaml

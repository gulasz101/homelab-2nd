---
# OpenTelemetry Collector DaemonSet.
# - Collects Kubernetes container logs via the filelog receiver and sends them
#   to Loki using the Loki exporter.
# - Receives OTLP metrics/traces/logs from applications and forwards them to
#   Prometheus (remote_write), Tempo (OTLP) and Loki (OTLP/loki exporter).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-collector
      version: ">=0.104.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    mode: daemonset

    image:
      repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
      tag: ""

    command:
      name: otelcol-contrib

    presets:
      logsCollection:
        enabled: true
        includeCollectorLogs: false
      kubernetesAttributes:
        enabled: true
      kubeletMetrics:
        enabled: false
      hostMetrics:
        enabled: false
      clusterMetrics:
        enabled: false
      kubernetesEvents:
        enabled: false

    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
            http:
              endpoint: ${env:MY_POD_IP}:4318

      exporters:
        otlphttp/loki:
          endpoint: http://loki-gateway.observability.svc.cluster.local:80/otlp
          tls:
            insecure: true

        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true

        prometheusremotewrite:
          endpoint: http://prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
          tls:
            insecure: true

        debug:
          verbosity: basic

      service:
        pipelines:
          logs:
            receivers: [otlp, filelog]
            processors: [batch, k8sattributes]
            exporters: [otlphttp/loki, debug]
          traces:
            receivers: [otlp]
            processors: [batch, k8sattributes]
            exporters: [otlp/tempo, debug]
          metrics:
            receivers: [otlp]
            processors: [batch, k8sattributes]
            exporters: [prometheusremotewrite, debug]

    # Loki 3.x supports native OTLP log ingestion at /otlp on port 3100.
    # The schemaConfig in the Loki HelmRelease already uses v13, which
    # enables structured metadata required for OTLP logs.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    service:
      # The DaemonSet still exposes OTLP via a headless service per node; apps
      # inside the cluster can use the DNS A-record for the collector service.
      enabled: true
      type: ClusterIP

    # The logsCollection preset already mounts /var/log/pods and
    # /var/lib/docker/containers, so we do not add them again as extra volumes.
    extraVolumes: []
    extraVolumeMounts: []

    # The logsCollection preset mounts /var/log/pods and /var/lib/docker/containers.
    # We keep runAsUser: 0 because log files on the node are owned by root and the
    # filelog receiver must traverse host paths. privileged: true is replaced with
    # fine-grained capabilities: read-only root fs, no privilege escalation, drop
    # all caps, add DAC_READ_SEARCH (enables reading files across UID boundaries).
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    securityContext:
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
        add:
          - DAC_READ_SEARCH

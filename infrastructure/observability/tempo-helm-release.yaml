---
# Grafana Tempo in single-binary mode with local filesystem storage.
# Receives OTLP traces on gRPC/HTTP and stores them on a local-path PVC.
# Uses the community-maintained grafana-community/helm-charts Tempo chart (OSS).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: tempo
      version: "2.2.3"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    tempo:
      # OTLP receivers enabled by default in the chart; keep them.
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      # Local filesystem storage on a PVC.
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal
      retention: 168h  # 7 days
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    persistence:
      enabled: true
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 10Gi

    # Service stays internal; Grafana accesses Tempo via the cluster service.
    service:
      type: ClusterIP

    # Expose Tempo metrics to Prometheus.
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

    # Tempo single-binary with WAL replay and all default receivers needs more
    # than 512Mi on startup. Keep request low but raise the limit.
    tempo:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

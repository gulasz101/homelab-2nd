---
# Standalone Grafana with datasources provisioned for Prometheus, Loki and Tempo.
# Admin password is injected from a SOPS-encrypted secret.
# Uses the community-maintained grafana-community/helm-charts Grafana chart (OSS).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "12.7.1"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: grafana-admin-credentials
      valuesKey: admin-password
      targetPath: admin.password
  values:
    # Generic OAuth via Authentik (OIDC). All OIDC client secrets are
    # injected through a SOPS-encrypted secret mounted as envFrom.
    envFromSecrets:
      - name: grafana-oidc-client

    env:
      GF_SERVER_ROOT_URL: "https://grafana.voitech.dev"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
      GF_AUTH_GENERIC_OAUTH_ICON: signin
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: "true"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "false"
      GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC: "false"

    initChownData:
      enabled: false

    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    # Provision datasources via a sidecar that watches ConfigMaps labelled
    # `grafana_datasource: "true"`.
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "true"
        reloadURL: "http://grafana.observability.svc.cluster.local:3000/api/admin/provisioning/datasources/reload"
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana.folder
        reloadURL: "http://grafana.observability.svc.cluster.local:3000/api/admin/provisioning/dashboards/reload"
        provider:
          foldersFromFilesStructure: true

    # Datasource definitions provisioned directly in values.
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-stack-kube-prom-prometheus.observability.svc.cluster.local:9090
            access: proxy
            isDefault: true
            editable: false
          - name: Loki
            type: loki
            url: http://loki-gateway.observability.svc.cluster.local:80
            access: proxy
            editable: false
          - name: Tempo
            type: tempo
            url: http://tempo.observability.svc.cluster.local:3200
            access: proxy
            editable: false

    # Service stays internal; Cloudflare Tunnel ingress is added separately.
    service:
      type: ClusterIP
      port: 3000

    # Expose Grafana metrics to Prometheus.
    serviceMonitor:
      enabled: true
      # The chart already injects 'release: <Helm release name>'; do not add a
      # second 'release' key here or Helm post-render fails with a duplicate key.

    # Disable bundled test pods.
    testFramework:
      enabled: false

---
# HelmRelease: Grafana Loki in SingleBinary mode with S3 object storage on OMV MinIO.
# Uses upstream grafana/loki chart v6.29.0 which reliably renders a single pod.
# Credentials are injected from the SOPS-encrypted loki-minio-creds secret via env vars
# and expanded in the Loki config at runtime via -config.expand-env=true.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.29.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-loki
        namespace: flux-system
      interval: 1h
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: loki-minio-creds
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
        s3:
          endpoint: http://192.168.1.180:9000
          s3ForcePathStyle: true
          insecure: true
          accessKeyId: ${S3_ACCESS_KEY_ID}
          secretAccessKey: ${S3_SECRET_ACCESS_KEY}
      schemaConfig:
        configs:
          - from: "2024-01-01"
            index:
              period: 24h
              prefix: index_
            object_store: s3
            schema: v13
            store: tsdb
      limits_config:
        allow_structured_metadata: true
        retention_period: 168h
    singleBinary:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      extraEnvFrom:
        - secretRef:
            name: loki-minio-creds
      persistence:
        enabled: true
        size: 1Gi
        storageClassName: local-path
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    minio:
      enabled: false
    gateway:
      enabled: true
    monitoring:
      lokiCanary:
        enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

---
# HelmRelease: Grafana Loki in SingleBinary mode with filesystem storage.
# Uses upstream grafana/loki chart v6.29.0 which reliably renders a single pod.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.29.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-loki
        namespace: flux-system
      interval: 1h
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            index:
              period: 24h
              prefix: index_
            object_store: filesystem
            schema: v13
            store: tsdb
      limits_config:
        allow_structured_metadata: true
        retention_period: 168h
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClassName: local-path
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    minio:
      enabled: false
    gateway:
      enabled: true
    monitoring:
      lokiCanary:
        enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

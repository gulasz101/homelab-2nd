---
# Grafana Loki in Monolithic (single-binary) mode.
# Logs are stored on a local-path PVC for low latency.
# Auth is disabled for the single-tenant homelab setup.
# NOTE: Chart v7+ uses `singleBinary` not `monolithic` for the deployment key.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: ">=6.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    deploymentMode: Monolithic

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        size: 20Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    # Disable the bundled MinIO — we already run MinIO on OMV and can switch
    # Loki to object storage later if desired.
    minio:
      enabled: false

    # Disable monitoring CRDs created by this chart to avoid duplicating
    # Prometheus Operator resources already provided by kube-prometheus-stack.
    monitoring:
      serviceMonitor:
        enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false

    gateway:
      enabled: false

    # Disable unnecessary HA/read replicas for the single-node homelab.
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0

---
# HelmRelease: Grafana Loki in Monolithic/SingleBinary mode with S3 object storage on OMV MinIO.
# Uses the community-maintained grafana-community/helm-charts Loki chart (OSS).
# Credentials are injected from the SOPS-encrypted loki-minio-creds secret via env vars
# and expanded in the Loki config at runtime via -config.expand-env=true.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "18.1.1"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 1h
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: loki-minio-creds
    deploymentMode: Monolithic
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
        s3:
          endpoint: http://192.168.1.180:9000
          s3ForcePathStyle: true
          insecure: true
          accessKeyId: ${S3_ACCESS_KEY_ID}
          secretAccessKey: ${S3_SECRET_ACCESS_KEY}
      schemaConfig:
        configs:
          - from: "2024-01-01"
            index:
              period: 24h
              prefix: index_
            object_store: s3
            schema: v13
            store: tsdb
      limits_config:
        allow_structured_metadata: true
        retention_period: 168h
      rulerConfig:
        alertmanager_url: http://prometheus-stack-kube-prom-alertmanager.observability.svc.cluster.local:9093
        enable_api: true
        enable_alertmanager_v2: true
        storage:
          type: local
          local:
            directory: /rules
        wal:
          dir: /var/loki/ruler-wal
        ring:
          kvstore:
            store: inmemory
        ruler_client:
          remote_timeout: 10s
        external_labels:
          cluster: homelab-2nd
          namespace: honcho
          alertname: HonchoUnexpectedErrors
    singleBinary:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      extraEnvFrom:
        - secretRef:
            name: loki-minio-creds
      persistence:
        enabled: true
        size: 1Gi
        storageClass: local-path
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
    # Disable caches and extra components for a lightweight single-node deployment.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    read:
      enabled: false
      replicas: 0
    write:
      enabled: false
      replicas: 0
    backend:
      enabled: false
      replicas: 0
    minio:
      enabled: false
    gateway:
      enabled: true
    lokiCanary:
      enabled: false
    test:
      enabled: false
    monitoring:
      lokiCanary:
        enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
      dashboards:
        enabled: false
      rules:
        enabled: false
      alerts:
        enabled: false

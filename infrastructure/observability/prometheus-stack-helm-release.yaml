---
# Prometheus + Prometheus Operator + node-exporter + kube-state-metrics.
# Grafana is disabled here because we deploy a standalone Grafana instance
# with datasources provisioned for Prometheus, Loki and Tempo.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=69.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # We run our own Grafana so we can provision LGTM datasources cleanly.
    grafana:
      enabled: false

    # Minimal Alertmanager for now; can be expanded later.
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['job']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
            - matchers:
                - namespace = honcho
              receiver: 'mattermost-webhook'
              continue: true
        receivers:
          - name: 'null'
          - name: 'mattermost-webhook'
            webhook_configs:
              - url_file: /etc/alertmanager/secrets/honcho-mattermost-webhook-url/url
                send_resolved: true
                max_alerts: 10
      secrets:
        - honcho-mattermost-webhook-url

    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 10d
        retentionSize: "8GB"
        enableRemoteWriteReceiver: true
        # Attach a host label to all metrics scraped by this Prometheus instance
        # so dashboard legends group cleanly alongside OMV's static-config host label.
        externalLabels:
          host: homelab-2nd
        # Discover ServiceMonitors/PodMonitors in all namespaces.
        # those labelled with the chart release name.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        # Storage for time-series data on fast local-path.
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        # Static scrape targets for the non-k8s openmediavault host.
        additionalScrapeConfigs:
          - job_name: omv-node
            static_configs:
              - targets: ["192.168.1.180:9100"]
                labels:
                  instance: openmediavault
                  host: openmediavault
          - job_name: omv-docker
            static_configs:
              - targets: ["192.168.1.180:9323"]
                labels:
                  instance: openmediavault
                  host: openmediavault
          - job_name: omv-cadvisor
            static_configs:
              - targets: ["192.168.1.180:8080"]
                labels:
                  instance: openmediavault
                  host: openmediavault
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi

    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    kube-state-metrics:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
      # Intel RAPL power counters under /sys/class/powercap are only readable by
      # root by default. Enable the chart's permission-fix init container so the
      # non-root node-exporter can read package/DRAM energy counters and expose
      # real CPU watts to Prometheus/Grafana.
      permissionInitContainer:
        fixes:
          rapl: true
      hostRootFsMount:
        enabled: true

    # Keep CRDs; Flux/Helm will manage them.
    crds:
      enabled: true

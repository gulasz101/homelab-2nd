---
# HelmRepository for the Grafana Loki chart (community-maintained fork).
# The upstream grafana/loki chart is now Enterprise-only; OSS users should use
# the grafana-community fork at https://grafana-community.github.io/helm-charts.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-loki
  namespace: flux-system
spec:
  interval: 1h
  url: https://grafana-community.github.io/helm-charts

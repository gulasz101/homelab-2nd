---
# ObjectStore for the Barman Cloud CNPG-I plugin — Authentik backups to OMV MinIO
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: authentik-db-backups
  namespace: auth
spec:
  configuration:
    destinationPath: s3://cnpg-backups/authentik/
    endpointURL: http://openmediavault.local:9000
    s3Credentials:
      accessKeyId:
        name: authentik-minio-backup-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: authentik-minio-backup-creds
        key: ACCESS_SECRET_KEY
    data:
      compression: gzip
    wal:
      compression: gzip

---
# CNPG Cluster for Authentik — single instance on local-path NVMe
# Backups + WAL archiving via the Barman Cloud CNPG-I plugin to OMV MinIO S3
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: auth
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie

  # Enable superuser access for break-glass operations
  enableSuperuserAccess: true

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"

  # Bootstrapping — create the authentik database and user
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-db-credentials

  # Storage — local-path on homelab-2nd NVMe (fast, NOT durable)
  storage:
    storageClass: local-path
    size: 10Gi

  # Backup via Barman Cloud CNPG-I plugin to OMV MinIO S3
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-db-backups
        serverName: authentik-db

  backup:
    retentionPolicy: "30d"

  # Resource limits — reasonable for a homelab
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

---
# Public hostname reminder for the auth.voitech.dev Cloudflare Tunnel.
# The actual ingress rule must be configured in the Cloudflare Zero Trust dashboard
# for the tunnel whose token lives in auth-tunnel-token.sops.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-tunnel-ingress
  namespace: auth
data:
  note: |
    # This is a reminder only — the real rule lives in Cloudflare Zero Trust.
    auth.voitech.dev -> http://authentik-server.auth.svc.cluster.local:80
    # (The Authentik pod listens on 9000, but the Kubernetes Service exposes it as port 80.)

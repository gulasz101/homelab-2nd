---
# Daily scheduled backup of the Authentik Postgres cluster
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-db-daily
  namespace: auth
spec:
  schedule: "0 3 * * *"  # Daily at 03:00 (cron without seconds)
  backupOwnerReference: self
  cluster:
    name: authentik-db
  immediate: true  # Take a backup right away when first created

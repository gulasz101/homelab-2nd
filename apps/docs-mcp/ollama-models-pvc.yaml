---
# Persistent storage for Ollama model weights.
# Lives on homelab-2nd local-path NVMe. Models can be re-pulled if lost.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: docs-mcp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

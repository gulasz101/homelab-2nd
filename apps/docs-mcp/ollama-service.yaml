---
# Cluster-internal service for the Ollama embedding container.
# docs-mcp-server talks to http://ollama-embeddings.docs-mcp.svc.cluster.local:11434/v1
apiVersion: v1
kind: Service
metadata:
  name: ollama-embeddings
  namespace: docs-mcp
  labels:
    app.kubernetes.io/name: ollama-embeddings
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama-embeddings
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP

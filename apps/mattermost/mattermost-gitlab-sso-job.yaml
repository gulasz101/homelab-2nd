---
# One-off Job to configure Mattermost Team Edition GitLab SSO pointing at Authentik.
# Mattermost image is distroless, so we copy mmctl out via an init container and run
# the actual mmctl commands from a small alpine shell container.
apiVersion: batch/v1
kind: Job
metadata:
  name: mattermost-gitlab-sso-setup-v2
  namespace: mattermost
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: copy-mmctl
          image: mattermost/mattermost-team-edition:11.9.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/cp
            - /mattermost/bin/mmctl
            - /shared/mmctl
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: mmctl
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MATTERMOST_URL
              value: "http://mattermost.mattermost.svc.cluster.local:8065"
            - name: MATTERMOST_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mattermost-initial-admin-password
                  key: username
            - name: MATTERMOST_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mattermost-initial-admin-password
                  key: password
            - name: MATTERMOST_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mattermost-oidc-client
                  key: client_id
            - name: MATTERMOST_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mattermost-oidc-client
                  key: client_secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MMCTL="/shared/mmctl"

              echo "Logging into Mattermost via mmctl..."
              "$MMCTL" auth login "$MATTERMOST_URL" \
                --username "$MATTERMOST_ADMIN_USERNAME" \
                --password "$MATTERMOST_ADMIN_PASSWORD" \
                --name local || true

              "$MMCTL" context set local || true

              echo "Configuring GitLab SSO to point at Authentik..."
              "$MMCTL" config set GitLabSettings.Enable true
              "$MMCTL" config set GitLabSettings.Id "$MATTERMOST_OAUTH_CLIENT_ID"
              "$MMCTL" config set GitLabSettings.Secret "$MATTERMOST_OAUTH_CLIENT_SECRET"
              "$MMCTL" config set GitLabSettings.AuthEndpoint "https://auth.voitech.dev/application/o/mattermost/authorize/"
              "$MMCTL" config set GitLabSettings.TokenEndpoint "https://auth.voitech.dev/application/o/mattermost/token/"
              "$MMCTL" config set GitLabSettings.UserAPIEndpoint "https://auth.voitech.dev/application/o/mattermost/userinfo/"
              "$MMCTL" config set GitLabSettings.IdEndpoint "https://auth.voitech.dev/application/o/mattermost/"

              echo "Disabling email sign-up/sign-in so GitLab (Authentik) is the public path..."
              "$MMCTL" config set EmailSettings.EnableSignUpWithEmail false
              "$MMCTL" config set EmailSettings.EnableSignInWithEmail false

              echo "Verifying GitLabSettings config..."
              "$MMCTL" config get GitLabSettings.Enable
              "$MMCTL" config get GitLabSettings.Id
              "$MMCTL" config get GitLabSettings.AuthEndpoint

              echo "Mattermost GitLab SSO config applied."
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: shared
          emptyDir: {}

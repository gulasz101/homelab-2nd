---
# One-off Job to configure Mattermost Team Edition GitLab SSO pointing at Authentik.
# Idempotent: re-running the Job applies the same config values.
apiVersion: batch/v1
kind: Job
metadata:
  name: mattermost-gitlab-sso-setup
  namespace: mattermost
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mmctl
          image: mattermost/mattermost-team-edition:11.9.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MATTERMOST_URL
              value: "http://mattermost.mattermost.svc.cluster.local:8065"
            - name: MATTERMOST_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mattermost-initial-admin-password
                  key: username
            - name: MATTERMOST_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mattermost-initial-admin-password
                  key: password
            - name: MATTERMOST_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mattermost-oidc-client
                  key: client_id
            - name: MATTERMOST_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mattermost-oidc-client
                  key: client_secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Logging into Mattermost via mmctl..."
              /mattermost/bin/mmctl auth login "$MATTERMOST_URL" \
                --username "$MATTERMOST_ADMIN_USERNAME" \
                --password "$MATTERMOST_ADMIN_PASSWORD" \
                --name local \
                --insecure-sha1-intermediate || true

              /mattermost/bin/mmctl context set local || true

              echo "Configuring GitLab SSO to point at Authentik..."
              /mattermost/bin/mmctl config set GitLabSettings.Enable true
              /mattermost/bin/mmctl config set GitLabSettings.Id "$MATTERMOST_OAUTH_CLIENT_ID"
              /mattermost/bin/mmctl config set GitLabSettings.Secret "$MATTERMOST_OAUTH_CLIENT_SECRET"
              /mattermost/bin/mmctl config set GitLabSettings.AuthEndpoint "https://auth.voitech.dev/application/o/mattermost/authorize/"
              /mattermost/bin/mmctl config set GitLabSettings.TokenEndpoint "https://auth.voitech.dev/application/o/mattermost/token/"
              /mattermost/bin/mmctl config set GitLabSettings.UserAPIEndpoint "https://auth.voitech.dev/application/o/mattermost/userinfo/"
              /mattermost/bin/mmctl config set GitLabSettings.IdEndpoint "https://auth.voitech.dev/application/o/mattermost/"

              echo "Disabling email sign-up/sign-in so GitLab (Authentik) is the public path..."
              /mattermost/bin/mmctl config set EmailSettings.EnableSignUpWithEmail false
              /mattermost/bin/mmctl config set EmailSettings.EnableSignInWithEmail false

              echo "Verifying GitLabSettings config..."
              /mattermost/bin/mmctl config get GitLabSettings.Enable
              /mattermost/bin/mmctl config get GitLabSettings.Id
              /mattermost/bin/mmctl config get GitLabSettings.AuthEndpoint

              echo "Mattermost GitLab SSO config applied."
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

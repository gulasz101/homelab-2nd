---
# CNPG Cluster for Mattermost — single instance on local-path NVMe
# Backups + WAL archiving via the Barman Cloud CNPG-I plugin to OMV MinIO
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mattermost-db
  namespace: mattermost
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16-minimal-trixie

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"

  # Bootstrapping — create the mattermost database and user
  bootstrap:
    initdb:
      database: mattermost
      owner: mattermost
      secret:
        name: mattermost-db-credentials

  # Storage — local-path on homelab-2nd NVMe (fast, NOT durable)
  storage:
    storageClass: local-path
    size: 10Gi

  # Barman Cloud CNPG-I plugin provides WAL archiving and base backups.
  # We stay on PostgreSQL 16 to avoid a risky major-version migration.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: mattermost-db-backups
        serverName: mattermost-db

  # Retention only — backup destination is handled by the plugin ObjectStore.
  backup:
    retentionPolicy: "30d"

  # Resource limits — reasonable for a homelab
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

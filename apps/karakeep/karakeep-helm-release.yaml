---
# Karakeep HelmRelease — official chart, single-pod StatefulSet, OMV NFS data + MinIO S3
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
  namespace: karakeep
spec:
  interval: 1h
  chart:
    spec:
      chart: karakeep
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: karakeep-app
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # -- Public URL used by NextAuth and the app
    applicationHost: keep.voitech.dev
    applicationProtocol: https

    # -- Disable chart-generated secrets; we inject our own via envFrom below.
    #    The chart expects applicationSecretKey/meilisearchMasterKey to be raw
    #    strings used as defaults for its own secrets, not secretKeyRefs.
    applicationSecretKey: ~
    meilisearchMasterKey: ~
    secrets:
      karakeep:
        enabled: false
      meilesearch:
        enabled: false

    # Chrome sidecar disabled to fit single-node CPU; plain-HTTP fallback crawls fine.
    controllers:
      karakeep:
        type: statefulset
        replicas: 1
        strategy: RollingUpdate
        containers:
          karakeep:
            envFrom:
              - secretRef:
                  name: karakeep-app-secrets
              - secretRef:
                  name: karakeep-oidc-client
              - secretRef:
                  name: karakeep-minio-assets
              - secretRef:
                  name: karakeep-litellm-key

            env:
              # -- SSO: Authentik OIDC only ─────────────────────────────────
              DISABLE_PASSWORD_AUTH: "true"
              # Signups are allowed only via OAuth (there is no local signup form).
              DISABLE_SIGNUPS: "false"
              OAUTH_AUTO_REDIRECT: "true"
              OAUTH_PROVIDER_NAME: "Authentik"
              OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
              OAUTH_WELLKNOWN_URL: "https://auth.voitech.dev/application/o/karakeep/.well-known/openid-configuration"

              # ── S3 asset store on OMV MinIO ─────────────────────────────
              ASSET_STORE_S3_ENDPOINT: "http://openmediavault.local:9000"
              ASSET_STORE_S3_BUCKET: "karakeep-assets"
              ASSET_STORE_S3_REGION: "us-east-1"
              ASSET_STORE_S3_FORCE_PATH_STYLE: "true"

              # ── AI tagging via LiteLLM proxy ─────────────────────────────
              OPENAI_BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
              INFERENCE_TEXT_MODEL: "gemma-4-12b-uncensored"
              INFERENCE_IMAGE_MODEL: "gemma-4-12b-uncensored"
              INFERENCE_CONTEXT_LENGTH: "8192"
              INFERENCE_ENABLE_AUTO_TAGGING: "true"
              INFERENCE_ENABLE_AUTO_SUMMARIZATION: "true"
              INFERENCE_OUTPUT_SCHEMA: "plain"
              INFERENCE_JOB_TIMEOUT_SEC: "300"

              # Chrome sidecar disabled; unset browser URL so crawler uses plain HTTP.
              BROWSER_WEB_URL: ""

              # ── Observability / misc ─────────────────────────────────────
              LOG_LEVEL: "info"
              WORKERS_PORT: "3001"
              WORKERS_HOST: "0.0.0.0"
              OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318"
              OTEL_LOGS_EXPORTER: "otlp"
              OTEL_RESOURCE_ATTRIBUTES: "service.name=karakeep,service.namespace=karakeep"

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  httpGet:
                    path: /api/health
                    port: 3000
              readiness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  httpGet:
                    path: /api/health
                    port: 3000

        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 10Gi
              storageClass: ""
              volumeName: karakeep-data

      chrome:
        enabled: false

    service:
      karakeep:
        controller: karakeep
        ports:
          http:
            port: 3000
      chrome: null

    persistence:
      chrome-tmp: null

    # Cloudflare Tunnel handles public ingress
    ingress:
      karakeep:
        enabled: false

    # Prometheus scraping annotations on the karakeep pod
    defaultPodOptions:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

    meilisearch:
      enabled: true
      auth:
        existingMasterKeySecret: karakeep-app-secrets
        existingMasterKeySecretKey: meili-master-key
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 10m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 2Gi

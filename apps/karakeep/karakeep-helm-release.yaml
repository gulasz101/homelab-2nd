---
# Karakeep HelmRelease — official chart, single-pod StatefulSet, OMV NFS data + MinIO S3
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
  namespace: karakeep
spec:
  interval: 1h
  chart:
    spec:
      chart: karakeep
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: karakeep-app
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # -- Public URL used by NextAuth and the app
    applicationHost: keep.voitech.dev
    applicationProtocol: https

    # -- Inject our pre-generated secrets instead of chart-generated ones
    applicationSecretKey:
      secretKeyRef:
        name: karakeep-app-secrets
        key: nextauth-secret
    meilisearchMasterKey:
      secretKeyRef:
        name: karakeep-app-secrets
        key: meili-master-key

    controllers:
      karakeep:
        type: statefulset
        replicas: 1
        strategy: RollingUpdate
        containers:
          karakeep:
            env:
              # ── SSO: Authentik OIDC only ─────────────────────────────────
              DISABLE_PASSWORD_AUTH: "true"
              OAUTH_AUTO_REDIRECT: "true"
              OAUTH_PROVIDER_NAME: "Authentik"
              OAUTH_SCOPE: "openid email profile"
              OAUTH_WELLKNOWN_URL: "https://auth.voitech.dev/application/o/karakeep/.well-known/openid-configuration"
              OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"

              # ── S3 asset store on OMV MinIO ─────────────────────────────
              ASSET_STORE_S3_ENDPOINT: "http://openmediavault.local:9000"
              ASSET_STORE_S3_BUCKET: "karakeep-assets"
              ASSET_STORE_S3_REGION: "us-east-1"
              ASSET_STORE_S3_FORCE_PATH_STYLE: "true"

              # ── AI tagging via LiteLLM proxy ─────────────────────────────
              OPENAI_BASE_URL: "https://llm.voitech.dev/v1"
              INFERENCE_TEXT_MODEL: "gemma-4-12b-uncensored"
              INFERENCE_IMAGE_MODEL: "gemma-4-12b-uncensored"
              INFERENCE_CONTEXT_LENGTH: "8192"
              INFERENCE_ENABLE_AUTO_TAGGING: "true"
              INFERENCE_ENABLE_AUTO_SUMMARIZATION: "true"
              INFERENCE_OUTPUT_SCHEMA: "plain"

              # ── Observability / misc ─────────────────────────────────────
              LOG_LEVEL: "info"
              WORKERS_PORT: "3001"
              WORKERS_HOST: "0.0.0.0"
              OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318"
              OTEL_LOGS_EXPORTER: "otlp"
              OTEL_RESOURCE_ATTRIBUTES: "service.name=karakeep,service.namespace=karakeep"

            envFrom:
              - secretRef:
                  name: karakeep-oidc-client
              - secretRef:
                  name: karakeep-minio-assets
              - secretRef:
                  name: karakeep-litellm-key

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  httpGet:
                    path: /api/health
                    port: 3000
              readiness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  httpGet:
                    path: /api/health
                    port: 3000

        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 10Gi
              storageClass: ""
              volumeName: karakeep-data

    service:
      karakeep:
        controller: karakeep
        ports:
          http:
            port: 3000

    # Cloudflare Tunnel handles public ingress
    ingress:
      karakeep:
        enabled: false

    chrome:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    meilisearch:
      auth:
        existingMasterKeySecret: karakeep-app-secrets
        existingMasterKeySecretKey: meili-master-key
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    persistence:
      chrome-tmp:
        type: emptyDir
        advancedMounts:
          chrome:
            chrome:
              - path: /tmp
                readOnly: false

    # Prometheus scraping annotations on the karakeep service
    defaultPodOptions:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

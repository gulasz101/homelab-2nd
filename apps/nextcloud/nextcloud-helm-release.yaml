---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: "9.1.3"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  install:
    remediation:
      retries: 3
    timeout: 30m
  upgrade:
    remediation:
      retries: 3
    timeout: 30m
  values:
    image:
      flavor: apache

    replicaCount: 1

    nextcloud:
      host: nextcloud-photos.voitech.dev
      username: admin
      password: changeme
      existingSecret:
        enabled: true
        secretName: nextcloud-admin-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password

      trustedDomains:
        - nextcloud-photos.voitech.dev
        - nextcloud.nextcloud.svc.cluster.local

      # PHP config overrides injected as config.php snippets
      configs:
        logging.config.php: |-
          <?php
          $CONFIG = array (
            'log_type' => 'stderr',
            'loglevel' => 2,
            'logtimezone' => 'Europe/Berlin',
          );
        preview.config.php: |-
          <?php
          $CONFIG = array (
            'enable_previews' => true,
            'preview_max_x' => 2048,
            'preview_max_y' => 2048,
            'preview_max_scale_factor' => 3,
            'enabledPreviewProviders' => array (
              'OC\\Preview\\PNG',
              'OC\\Preview\\JPEG',
              'OC\\Preview\\GIF',
              'OC\\Preview\\BMP',
              'OC\\Preview\\XBitmap',
              'OC\\Preview\\MP3',
              'OC\\Preview\\MP4',
              'OC\\Preview\\MKV',
              'OC\\Preview\\TXT',
              'OC\\Preview\\MarkDown',
              'OC\\Preview\\PDF'
            ),
          );
        public-url.config.php: |-
          <?php
          $CONFIG = array (
            'overwriteprotocol' => 'https',
            'overwritehost' => 'nextcloud-photos.voitech.dev',
            'overwrite.cli.url' => 'https://nextcloud-photos.voitech.dev',
            'trusted_proxies' => array('10.0.0.0/8'),
          );

      datadir: /var/www/html/data

      # S3 primary storage on OMV MinIO. The chart translates this into
      # OBJECTSTORE_S3_* environment variables, which the Nextcloud
      # entrypoint writes into config.php as objectstore => S3 on first
      # install. All user files are streamed to MinIO; the local data dir
      # only holds thumbnails, cache, and minimal metadata.
      objectStore:
        s3:
          enabled: true
          existingSecret: nextcloud-minio-creds
          secretKeys:
            accessKey: accessKeyId
            secretKey: secretAccessKey
          host: openmediavault.local
          port: 9000
          ssl: false
          usePathStyle: true
          region: us-east-1
          bucket: nextcloud-photos
          autoCreate: false
          legacyAuth: false

    # External Postgres via CNPG
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-db-rw.nextcloud.svc.cluster.local:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db-creds
        usernameKey: username
        passwordKey: password
        databaseKey: database

    # Redis for file locking / caching (ephemeral, no persistence)
    redis:
      enabled: true
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
      replica:
        replicaCount: 0

    externalRedis:
      enabled: false

    # Persistence: keep the whole Nextcloud root on the existing OMV NFS PVC
    # (nextcloud-html, 20Gi). This holds code, config, apps, cache, and local
    # thumbnails. The data directory (/var/www/html/data) is split out to the
    # dedicated 200Gi NFS PVC nextcloud-data. All durable user files still live
    # in MinIO S3 primary storage. Do not set storageClass or size here.
    persistence:
      enabled: true
      existingClaim: nextcloud-html
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data

    # Cronjob for background jobs
    cronjob:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # Resource sizing
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

    # PHP tuning for large photo/video uploads
    phpConfigs:
      uploads.ini: |-
        upload_max_filesize=1G
        post_max_size=1G
        max_execution_time=300
        memory_limit=1024M

    # Liveness/readiness — give first-install plenty of time on NFS; the
    # Nextcloud entrypoint rsyncs ~500MB of code to /var/www/html every start.
    livenessProbe:
      enabled: true
      initialDelaySeconds: 600
      periodSeconds: 30
      failureThreshold: 20
      timeoutSeconds: 10
    readinessProbe:
      enabled: true
      initialDelaySeconds: 300
      periodSeconds: 15
      failureThreshold: 60
      timeoutSeconds: 5

    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 120
      timeoutSeconds: 5

    # Metrics exporter
    metrics:
      enabled: true
      https: false
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9205"

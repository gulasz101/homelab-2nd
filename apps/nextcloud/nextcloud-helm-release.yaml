---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: "9.1.3"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    image:
      flavor: apache

    replicaCount: 1

    nextcloud:
      host: nextcloud-photos.voitech.dev
      username: admin
      password: changeme
      existingSecret:
        enabled: true
        secretName: nextcloud-admin-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password

      trustedDomains:
        - nextcloud-photos.voitech.dev
        - nextcloud.nextcloud.svc.cluster.local

      # PHP config overrides injected as config.php snippets
      configs:
        logging.config.php: |-
          <?php
          $CONFIG = array (
            'log_type' => 'stderr',
            'loglevel' => 2,
            'logtimezone' => 'Europe/Berlin',
          );
        preview.config.php: |-
          <?php
          $CONFIG = array (
            'enable_previews' => true,
            'preview_max_x' => 2048,
            'preview_max_y' => 2048,
            'preview_max_scale_factor' => 3,
            'enabledPreviewProviders' => array (
              'OC\\Preview\\PNG',
              'OC\\Preview\\JPEG',
              'OC\\Preview\\GIF',
              'OC\\Preview\\BMP',
              'OC\\Preview\\XBitmap',
              'OC\\Preview\\MP3',
              'OC\\Preview\\MP4',
              'OC\\Preview\\MKV',
              'OC\\Preview\\TXT',
              'OC\\Preview\\MarkDown',
              'OC\\Preview\\PDF'
            ),
          );
        public-url.config.php: |-
          <?php
          $CONFIG = array (
            'overwriteprotocol' => 'https',
            'overwritehost' => 'nextcloud-photos.voitech.dev',
            'overwrite.cli.url' => 'https://nextcloud-photos.voitech.dev',
            'trusted_proxies' => array('10.0.0.0/8'),
          );

      datadir: /var/www/html/data

      # S3 primary storage on OMV MinIO
      objectStore:
        s3:
          enabled: true
          existingSecret: nextcloud-minio-creds
          secretKeys:
            accessKey: accessKeyId
            secretKey: secretAccessKey
          host: openmediavault.local
          port: 9000
          ssl: false
          usePathStyle: true
          region: us-east-1
          bucket: nextcloud-photos
          autoCreate: false
          legacyAuth: false

    # External Postgres via CNPG
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-db-rw.nextcloud.svc.cluster.local:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db-credentials
        usernameKey: username
        passwordKey: password
        databaseKey: database

    # Redis for file locking / caching (ephemeral, no persistence)
    redis:
      enabled: true
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
      replica:
        replicaCount: 0

    externalRedis:
      enabled: false

    # Persistence: code lives on fast emptyDir (NVMe), only durable dirs on OMV NFS
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 10Gi
      # Keep Nextcloud code in emptyDir (local NVMe) for fast startup
      emptyDir:
        enabled: true
      nextcloudData:
        enabled: false

    extraVolumes:
      - name: nextcloud-config-nfs
        persistentVolumeClaim:
          claimName: nextcloud-html
      - name: nextcloud-data-nfs
        persistentVolumeClaim:
          claimName: nextcloud-data

    extraVolumeMounts:
      - name: nextcloud-config-nfs
        mountPath: /var/www/html/config
        subPath: config
      - name: nextcloud-config-nfs
        mountPath: /var/www/html/custom_apps
        subPath: custom_apps
      - name: nextcloud-config-nfs
        mountPath: /var/www/html/themes
        subPath: themes
      - name: nextcloud-data-nfs
        mountPath: /var/www/html/data
        subPath: data

    # Cronjob for background jobs
    cronjob:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # Resource sizing
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

    # PHP tuning for large photo/video uploads
    phpConfigs:
      uploads.ini: |-
        upload_max_filesize=1G
        post_max_size=1G
        max_execution_time=300
        memory_limit=1024M

    # Liveness/readiness — give NFS + first-install plenty of time
    livenessProbe:
      enabled: true
      initialDelaySeconds: 300
      periodSeconds: 30
      failureThreshold: 10
      timeoutSeconds: 5
    readinessProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 30
      timeoutSeconds: 5

    startupProbe:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 5

    # Metrics exporter
    metrics:
      enabled: true
      https: false
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9205"

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Mattermost namespace
  - mattermost/namespace.yaml
  # SOPS-encrypted secrets
  - mattermost/mattermost-db-credentials.sops.yaml
  - mattermost/minio-backup-creds.sops.yaml
  - mattermost/mattermost-minio-creds.sops.yaml
  - mattermost/chat-tunnel-token.sops.yaml
  - mattermost/mattermost-initial-admin-password.sops.yaml
  # Provisioned Grafana dashboard for Mattermost
  - mattermost/mattermost-dashboard-configmap.yaml
  # CNPG Cluster for Mattermost Postgres
  - mattermost/postgres-cluster.yaml
  - mattermost/scheduled-backup.yaml
  # Mattermost HelmRelease
  - mattermost/mattermost-helm-release.yaml
  # Cloudflare Tunnel for chat.voitech.dev -> Mattermost
  - mattermost/cloudflared-chat-deployment.yaml
  # LLM hub namespace
  - llm-hub/namespace.yaml
  # SOPS-encrypted secrets
  - llm-hub/litellm-db-credentials.sops.yaml
  - llm-hub/openwebui-db-credentials.sops.yaml
  - llm-hub/litellm-master-key.sops.yaml
  - llm-hub/litellm-provider-keys.sops.yaml
  - llm-hub/litellm-user-keys.sops.yaml
  - llm-hub/openwebui-admin-credentials.sops.yaml
  - llm-hub/openwebui-wife-credentials.sops.yaml
  - llm-hub/openwebui-secret-key.sops.yaml
  - llm-hub/llm-hub-backup-creds.sops.yaml
  - llm-hub/openwebui-minio-creds.sops.yaml
  - llm-hub/litellm-tunnel-token.sops.yaml
  - llm-hub/openwebui-tunnel-token.sops.yaml
  # LiteLLM virtual-key model-whitelist reconciler
  - llm-hub/litellm-key-provisioner-configmap.yaml
  - llm-hub/litellm-key-provisioner-cronjob.yaml
  # CNPG clusters for LiteLLM and Open WebUI
  - llm-hub/litellm-db-postgres-cluster.yaml
  - llm-hub/openwebui-db-postgres-cluster.yaml
  - llm-hub/litellm-db-objectstore.yaml
  - llm-hub/openwebui-db-objectstore.yaml
  - llm-hub/litellm-db-init-scripts-configmap.yaml
  - llm-hub/openwebui-db-init-scripts-configmap.yaml
  - llm-hub/litellm-scheduled-backup.yaml
  - llm-hub/openwebui-scheduled-backup.yaml
  # Helm repositories
  - llm-hub/litellm-helm-repository.yaml
  - llm-hub/openwebui-helm-repository.yaml
  # Helm releases
  - llm-hub/litellm-helm-release.yaml
  - llm-hub/openwebui-helm-release.yaml
  # Cloudflare Tunnels for llm.voitech.dev and ai-chat.voitech.dev
  - llm-hub/cloudflared-litellm-deployment.yaml
  - llm-hub/cloudflared-openwebui-deployment.yaml
  # Docs MCP namespace
  - docs-mcp/namespace.yaml
  # SOPS-encrypted secrets
  - docs-mcp/docs-mcp-embedding-key.sops.yaml
  # Local docs-mcp SQLite/config PVCs
  - docs-mcp/docs-mcp-data-pvc.yaml
  - docs-mcp/docs-mcp-config-pvc.yaml
  - docs-mcp/docs-mcp-config-configmap.yaml
  # Docs MCP Server (local-only)
  - docs-mcp/docs-mcp-deployment.yaml
  - docs-mcp/docs-mcp-service.yaml
  # tldraw namespace
  - tldraw/namespace.yaml
  # SOPS-encrypted secrets
  - tldraw/tldraw-db-credentials.sops.yaml
  - tldraw/tldraw-minio-backup-creds.sops.yaml
  - tldraw/tldraw-oidc-client.sops.yaml
  - tldraw/tldraw-tunnel-token.sops.yaml
  # CNPG cluster + backups for tldraw
  - tldraw/objectstore.yaml
  - tldraw/postgres-cluster.yaml
  - tldraw/scheduled-backup.yaml
  # Cloudflare Tunnel for white-board.voitech.dev
  - tldraw/cloudflared-tldraw-deployment.yaml
  - tldraw/tldraw-tunnel-ingress-configmap.yaml
  # GPU-accelerated embedding platform service (TEI - preferred GPU path)
  # Disabled: TEI prebuilt images do not support Maxwell sm_52 and the CPU image
  # fails to parse the nomic model config. Keep files in repo for a future GPU upgrade.
  # - gpu-embedding/tei-model-cache-pvc.yaml
  # - gpu-embedding/tei-deployment.yaml
  # - gpu-embedding/tei-service.yaml
  # - gpu-embedding/gpu-embedding-service.yaml
  # GPU-accelerated embedding platform service (Ollama - pragmatic path for Maxwell)
  - gpu-embedding/namespace.yaml
  - gpu-embedding/ollama-models-pvc.yaml
  - gpu-embedding/ollama-deployment.yaml
  - gpu-embedding/ollama-service.yaml
  - gpu-embedding/gpu-embedding-service.yaml
  # gpu-embedding observability: alerts + provisioned dashboard
  - gpu-embedding/gpu-embedding-mattermost-webhook-url.sops.yaml
  - gpu-embedding/gpu-embedding-alertmanager-config.yaml
  - gpu-embedding/gpu-embedding-prometheus-rules.yaml
  - gpu-embedding/gpu-embedding-loki-rule.yaml
  - gpu-embedding/gpu-embedding-dashboard-configmap.yaml
  # Nextcloud namespace
  - nextcloud/namespace.yaml
  # SOPS-encrypted secrets
  - nextcloud/nextcloud-admin-credentials.sops.yaml
  - nextcloud/nextcloud-db-creds.sops.yaml
  - nextcloud/nextcloud-minio-creds.sops.yaml
  - nextcloud/nextcloud-backup-creds.sops.yaml
  - nextcloud/nextcloud-redis-creds.sops.yaml
  - nextcloud/nextcloud-cloudflare-token.sops.yaml
  # NFS PV/PVCs
  - nextcloud/nextcloud-html-pv.yaml
  - nextcloud/nextcloud-html-pvc.yaml
  - nextcloud/nextcloud-data-pv.yaml
  - nextcloud/nextcloud-data-pvc.yaml
  # CNPG Cluster for Nextcloud
  - nextcloud/postgres-cluster.yaml
  - nextcloud/scheduled-backup.yaml
  # Nextcloud HelmRelease
  - nextcloud/nextcloud-helm-release.yaml
  # Cloudflare Tunnel for photos.voitech.dev -> Nextcloud
  - nextcloud/cloudflared-deployment.yaml
  # Honcho namespace
  - honcho/namespace.yaml
  # SOPS-encrypted secrets
  - honcho/honcho-db-credentials.sops.yaml
  - honcho/honcho-secrets.sops.yaml
  - honcho/honcho-minio-backup-creds.sops.yaml
  - honcho/honcho-mattermost-webhook-url.sops.yaml
  # Non-secret config
  - honcho/honcho-configmap.yaml
  # CNPG Cluster + backups for Honcho
  - honcho/postgres-cluster.yaml
  - honcho/scheduled-backup.yaml
  # Redis cache/queue
  - honcho/redis-pvc.yaml
  - honcho/redis-deployment.yaml
  - honcho/redis-service.yaml
  # Honcho API + Deriver deployments
  - honcho/honcho-api-deployment.yaml
  - honcho/honcho-deriver-deployment.yaml
  # AlertmanagerConfig to route Honcho alerts to Mattermost
  - honcho/honcho-alertmanager-config.yaml
  # PrometheusRule for Honcho CPU/memory resource alerts
  - honcho/honcho-prometheus-rules.yaml
  # Loki Ruler rule for Honcho error alerts
  - honcho/honcho-error-loki-rule.yaml
  # Provisioned Grafana dashboard for Honcho
  - honcho/honcho-dashboard-configmap.yaml
  # LAN-only NodePort service
  - honcho/honcho-service.yaml

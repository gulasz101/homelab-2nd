---
# Daily scheduled base backups for the tldraw CNPG cluster
# Uses the Barman Cloud CNPG-I plugin.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: tldraw-db-daily
  namespace: apps-tldraw
spec:
  schedule: "0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: tldraw-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true

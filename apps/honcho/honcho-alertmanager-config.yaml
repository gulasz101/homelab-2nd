---
# AlertmanagerConfig: route Honcho namespace alerts to the Mattermost webhook.
# The webhook secret must live in the same namespace as this AlertmanagerConfig
# because the Prometheus Operator only resolves urlSecret references within the
# CRD's own namespace. The operator reads the secret and inlines the URL into
# Alertmanager's generated config; no cross-namespace lookup is performed.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: honcho-mattermost-alerts
  namespace: honcho
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: honcho-mattermost
    matchers:
      - name: namespace
        value: honcho
        matchType: '='
  receivers:
    - name: honcho-mattermost
      webhookConfigs:
        - urlSecret:
            name: honcho-mattermost-webhook-url
            key: url
          sendResolved: true
          maxAlerts: 10

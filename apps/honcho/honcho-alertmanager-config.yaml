---
# AlertmanagerConfig: route Honcho namespace alerts to the Mattermost webhook.
# The webhook secret lives in the observability namespace because Alertmanager
# only mounts secrets from its own namespace.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: honcho-mattermost-alerts
  namespace: honcho
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: honcho-mattermost
    matchers:
      - name: namespace
        value: honcho
        matchType: '='
  receivers:
    - name: honcho-mattermost
      webhookConfigs:
        - urlSecret:
            name: honcho-mattermost-webhook-url
            key: url
          sendResolved: true
          maxAlerts: 10

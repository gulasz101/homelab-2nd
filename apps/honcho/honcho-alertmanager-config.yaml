---
# AlertmanagerConfig: route Honcho namespace alerts to the Mattermost webhook.
# The webhook secret is mounted by the kube-prometheus-stack Alertmanager pod
# (alertmanagerSpec.secrets) into /etc/alertmanager/secrets/<secret-name>/<key>.
# We reference that mounted file with url_file so the namespace-scoped
# AlertmanagerConfig does not need cross-namespace secret access.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: honcho-mattermost-alerts
  namespace: honcho
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: honcho-mattermost
    matchers:
      - name: namespace
        value: honcho
        matchType: '='
  receivers:
    - name: honcho-mattermost
      webhookConfigs:
        - url_file: /etc/alertmanager/secrets/honcho-mattermost-webhook-url/url
          sendResolved: true
          maxAlerts: 10

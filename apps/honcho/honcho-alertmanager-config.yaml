---
# AlertmanagerConfig: route Honcho namespace alerts to the Mattermost webhook.
# The receiver is global (prometheus-stack HelmRelease mounts the secret in the
# alertmanager container), but this CRD lets namespace-scoped PrometheusRules
# match the route via the namespace=honcho label.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: honcho-mattermost-alerts
  namespace: honcho
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: honcho-mattermost
    matchers:
      - name: namespace
        value: honcho
        matchType: "="
  receivers:
    - name: honcho-mattermost
      webhookConfigs:
        - urlSecret:
            name: honcho-mattermost-webhook-url
            key: url
          sendResolved: true
          maxAlerts: 10

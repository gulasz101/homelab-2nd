---
# Honcho Deriver worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-deriver
  namespace: honcho
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-deriver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-deriver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: deriver
          image: ghcr.io/gulasz101/honcho:latest
          command: ["python", "-m", "src.deriver"]
          workingDir: /app
          env:
            - name: DB_CONNECTION_URI
              valueFrom:
                secretKeyRef:
                  name: honcho-db-credentials
                  key: connection-uri
            - name: CACHE_URL
              valueFrom:
                secretKeyRef:
                  name: honcho-redis-credentials
                  key: cache-url
            - name: LLM_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: honcho-litellm-key
                  key: api-key
          envFrom:
            - configMapRef:
                name: honcho-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

---
# Non-secret Honcho runtime configuration.
# Secret values live in SOPS-encrypted Kubernetes Secrets and are mounted as env vars.
apiVersion: v1
kind: ConfigMap
metadata:
  name: honcho-config
  namespace: honcho
data:
  # LiteLLM proxy endpoint. Inside k3s we use the in-cluster service to avoid
  # Cloudflare WAF blocking the OpenAI SDK's fingerprint on llm.voitech.dev.
  LLM_OPENAI_BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000"
  # Embedding model is served by Ollama Cloud via LiteLLM proxy.
  EMBEDDING_MODEL_CONFIG__MODEL: "nomic-embed-text"
  EMBEDDING_MODEL_CONFIG__TRANSPORT: "openai"
  EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: "http://192.168.1.179:30114/v1"
  EMBEDDING_VECTOR_DIMENSIONS: "768"
  VECTOR_STORE_TYPE: "pgvector"
  # Deriver model.
  DERIVER_MODEL_CONFIG__TRANSPORT: "openai"
  DERIVER_MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  # Summary model.
  SUMMARY_MODEL_CONFIG__TRANSPORT: "openai"
  SUMMARY_MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  # Dream model.
  DREAM_MODEL_CONFIG__TRANSPORT: "openai"
  DREAM_MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DREAM_MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  # Dialectic levels. Env shape must match Pydantic nested dict keys:
  # DIALECTIC.LEVELS["low"].MODEL_CONFIG.model
  DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  DIALECTIC_LEVELS__LOW__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__LOW__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__LOW__MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  DIALECTIC_LEVELS__MAX__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__MAX__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__MAX__MODEL_CONFIG__OVERRIDES__BASE_URL: "http://litellm.llm-hub.svc.cluster.local:4000/v1"
  # Honcho auth is disabled for the local homelab deployment.
  HONCHO_AUTH_ENABLED: "false"
  # Logging
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

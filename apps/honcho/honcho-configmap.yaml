---
# Non-secret Honcho runtime configuration.
# Secret values live in SOPS-encrypted Kubernetes Secrets and are mounted as env vars.
apiVersion: v1
kind: ConfigMap
metadata:
  name: honcho-config
  namespace: honcho
data:
  # LiteLLM proxy endpoint — all LLM traffic routes through here.
  LLM_OPENAI_BASE_URL: "https://llm.voitech.dev"
  # Embedding model is served by Ollama Cloud via LiteLLM proxy.
  EMBEDDING_MODEL_CONFIG__MODEL: "nomic-embed-text"
  EMBEDDING_MODEL_CONFIG__TRANSPORT: "openai"
  EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: "http://192.168.1.179:30114/v1"
  EMBEDDING_VECTOR_DIMENSIONS: "768"
  VECTOR_STORE_TYPE: "pgvector"
  # Deriver model.
  DERIVER_MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  # Dialectic levels. Env shape must match Pydantic nested dict keys:
  # DIALECTIC.LEVELS["low"].MODEL_CONFIG.model
  DIALECTIC_LEVELS__LOW__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__MODEL: "mistral-3.5-middle"
  # Honcho auth is disabled for the local homelab deployment.
  HONCHO_AUTH_ENABLED: "false"
  # Logging
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

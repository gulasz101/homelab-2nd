---
# LAN-only NodePort Service for the Honcho API.
# Reachable inside the network on 192.168.1.179:30800.
# No public ingress / Cloudflare tunnel.
apiVersion: v1
kind: Service
metadata:
  name: honcho-api
  namespace: honcho
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: honcho-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800

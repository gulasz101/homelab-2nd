---
# LiteLLM Postgres cluster — single instance on local-path NVMe
# Backups + WAL archiving to OMV MinIO S3 bucket 'cnpg-backups'
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: litellm-db
  namespace: llm-hub
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
    extensions:
      - name: pgvector
        image:
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.3-18-trixie

  bootstrap:
    initdb:
      database: litellm
      owner: litellm
      secret:
        name: litellm-db-credentials
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: litellm-db-init-scripts
            key: init-app.sql

  storage:
    storageClass: local-path
    size: 10Gi
  # Backup + WAL archiving to OMV MinIO S3
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/litellm/
      endpointURL: http://openmediavault.local:9000
      s3Credentials:
        accessKeyId:
          name: llm-hub-backup-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: llm-hub-backup-creds
          key: ACCESS_SECRET_KEY
      data:
        compression: gzip
    retentionPolicy: "30d"

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

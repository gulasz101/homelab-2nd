---
# ConfigMap for the LiteLLM virtual-key model-whitelist provisioner.
# The script runs inside a CronJob and ensures every declared user key has
# access to the same model list that is configured in the LiteLLM proxy.
# Uses only Python stdlib, so no runtime package installs are needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-key-provisioner
  namespace: llm-hub
data:
  provision.py: |
    import json
    import os
    import sys
    import urllib.error
    import urllib.request

    LITELLM_URL = os.environ.get("LITELLM_URL", "http://litellm:4000")
    MASTER_KEY = os.environ.get("LITELLM_MASTER_KEY", "")
    DESIRED_MODELS = [
        "kimi-k2.7-code",
        "glm-5.2-ollama",
        "glm-5.2-zai",
        "glm-4.7-zai",
        "mistral-3.5-middle",
        "hy3-free",
        # OpenCode Go subscription models
        "kimi-k3-go",
        "kimi-k2.7-code-go",
        "kimi-k2.6-go",
        "kimi-k2.5-go",
        "glm-5.2-go",
        "glm-5.1-go",
        "glm-5-go",
        "minimax-m3-go",
        "minimax-m2.7-go",
        "minimax-m2.5-go",
        "deepseek-v4-pro-go",
        "deepseek-v4-flash-go",
        "qwen3.7-max-go",
        "qwen3.7-plus-go",
        "qwen3.6-plus-go",
        "qwen3.5-plus-go",
        "mimo-v2-pro-go",
        "mimo-v2-omni-go",
        "mimo-v2.5-pro-go",
        "mimo-v2.5-go",
        "hy3-preview-go",
        "grok-4.5-go",
    ]

    def expand_models(models):
        # LiteLLM clients may pass either the bare model name or an
        # openai/ prefixed name. Allow both forms so keys work regardless
        # of how the caller names the model.
        expanded = []
        for m in models:
            expanded.append(m)
            if not m.startswith("openai/"):
                expanded.append(f"openai/{m}")
        return expanded

    # Kubernetes maps secret keys like 'hermes-andrzej-key' to env vars
    # HERMES_ANDRZEJ_KEY. This list must match the keys in the
    # litellm-user-keys Secret.
    KEY_ENV_NAMES = [
        "WIFE_KEY",
        "WOJTEK_KEY",
        "HERMES_ANDRZEJ_KEY",
        "MEMORY_HONCHO_KEY",
        "HERMES_BILL_CIPHER_KEY",
    ]

    def api_request(path, token=None, method="GET", data=None):
        url = f"{LITELLM_URL}{path}"
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        body = None
        if data is not None:
            body = json.dumps(data).encode("utf-8")
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                return json.loads(resp.read().decode("utf-8"))
        except urllib.error.HTTPError as e:
            err = e.read().decode("utf-8")
            print(f"ERROR {method} {path}: HTTP {e.code} {err}")
            raise


    def main():
        if not MASTER_KEY:
            print("LITELLM_MASTER_KEY not set; aborting")
            sys.exit(1)

        desired_models = expand_models(DESIRED_MODELS)
        desired_sorted = sorted(desired_models)

        for env_name in KEY_ENV_NAMES:
            token = os.environ.get(env_name)
            if not token:
                print(f"Skipping {env_name}: no token")
                continue

            key_alias = env_name.replace("_", "-").lower()
            print(f"Checking {key_alias}...")

            try:
                info = api_request("/key/info", token=token)
            except urllib.error.HTTPError:
                print(f"WARN: could not read info for {key_alias}")
                continue

            current_models = sorted(info.get("info", {}).get("models", []))
            if current_models != desired_sorted:
                print(f"Updating {key_alias}: {current_models} -> {desired_sorted}")
                api_request(
                    "/key/update",
                    token=MASTER_KEY,
                    method="POST",
                    data={"key": token, "models": desired_models},
                )
                print(f"{key_alias} updated")
            else:
                print(f"{key_alias} already correct")


    if __name__ == "__main__":
        main()

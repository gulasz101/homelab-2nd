---
# LiteLLM Proxy HelmRelease
# - Central AI gateway with virtual keys, spend tracking, model routing.
# - Uses external Postgres via CloudNativePG (not chart-bundled Postgres).
# - Prometheus metrics enabled via ServiceMonitor.
# - Internal ClusterIP only; public ingress via dedicated Cloudflare Tunnel.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: llm-hub
spec:
  interval: 1h
  chart:
    spec:
      chart: litellm-helm
      version: "1.85.7"
      sourceRef:
        kind: HelmRepository
        name: litellm
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    # DB connection pieces come from SOPS-encrypted secret
    - kind: Secret
      name: litellm-db-credentials
      valuesKey: externalConnectionString
      targetPath: db.url
  values:
    replicaCount: 1

    image:
      repository: ghcr.io/berriai/litellm-database
      pullPolicy: IfNotPresent
      # Chart default appVersion is fine; pin only if needed
      tag: "v1.85.7"

    nameOverride: "litellm"

    # Use our CNPG Postgres, not the bundled Bitnami one
    db:
      useExisting: true
      deployStandalone: false
      endpoint: litellm-db-rw.llm-hub.svc.cluster.local
      database: litellm
      # db.url is injected via valuesFrom above; username/password from secret
      secret:
        name: litellm-db-credentials
        usernameKey: username
        passwordKey: password
        endpointKey: host

    # Master key from SOPS-encrypted secret
    masterkeySecretName: "litellm-master-key"
    masterkeySecretKey: "master-key"

    # Provider API keys are injected via environmentSecrets below
    # and referenced in proxy_config with os.environ/<VAR>
    extraEnvVars:
      - name: LITELLM_SALT_KEY
        valueFrom:
          secretKeyRef:
            name: litellm-master-key
            key: salt-key
      # LiteLLM's native Z.AI provider expects ZAI_API_KEY.
      # The SOPS secret currently stores the same credential as GLM_API_KEY,
      # so alias it without duplicating the secret.
      - name: ZAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: litellm-provider-keys
            key: GLM_API_KEY
      # OpenRouter provider expects OPENROUTER_API_KEY.
      - name: OPENROUTER_API_KEY
        valueFrom:
          secretKeyRef:
            name: litellm-provider-keys
            key: OPENROUTER_API_KEY
      # OpenCode Go subscription provider
      - name: OPENCODE_GO_API_KEY
        valueFrom:
          secretKeyRef:
            name: litellm-provider-keys
            key: OPENCODE_GO_API_KEY
      # SSO via Generic OIDC (Authentik) — Admin UI login only
      - name: GENERIC_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: litellm-oidc-client
            key: client_id
      - name: GENERIC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: litellm-oidc-client
            key: client_secret
      - name: GENERIC_AUTHORIZATION_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: litellm-oidc-client
            key: authorization_endpoint
      - name: GENERIC_TOKEN_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: litellm-oidc-client
            key: token_endpoint
      - name: GENERIC_USERINFO_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: litellm-oidc-client
            key: userinfo_endpoint
      - name: PROXY_BASE_URL
        value: "https://llm.voitech.dev"
      # Restrict SSO logins to voitech.dev emails
      - name: ALLOWED_EMAIL_DOMAINS
        value: "voitech.dev"

    # proxy_config is rendered into a ConfigMap and mounted as /app/config/config.yaml
    proxy_config:
      model_list:
        - model_name: kimi-k2.7-code
          litellm_params:
            model: openai/kimi-k2.7-code
            api_base: "https://ollama.com/v1"
            api_key: "os.environ/OLLAMA_API_KEY"
        - model_name: glm-5.2-ollama
          litellm_params:
            model: openai/glm-5.2
            api_base: "https://ollama.com/v1"
            api_key: "os.environ/OLLAMA_API_KEY"
        - model_name: glm-5.2-zai
          litellm_params:
            # z.ai markets this as glm-5.2, but LiteLLM's provider map only knows zai/glm-5.
            # Alias keeps the user-facing name while routing to the recognised slug.
            # Suffix -zai distinguishes from the Ollama-hosted glm-5.2-ollama variant.
            model: zai/glm-5
            api_key: "os.environ/ZAI_API_KEY"
        - model_name: glm-4.7-zai
          litellm_params:
            # Z.AI's flagship GLM-4.7 model (200K context, reasoning)
            # Suffix -zai distinguishes from any future Ollama-hosted variant.
            model: zai/glm-4.7
            api_key: "os.environ/ZAI_API_KEY"
        - model_name: mistral-3.5-middle
          litellm_params:
            model: mistral/mistral-medium-latest
            api_key: "os.environ/MISTRAL_API_KEY"
        - model_name: hy3-free
          litellm_params:
            # Tencent Hybrid 3 (MoE) via OpenRouter free tier
            model: openrouter/tencent/hy3:free
            api_key: "os.environ/OPENROUTER_API_KEY"

        # ── OpenCode Go subscription models (all with -go suffix) ──────
        # All models below route through https://opencode.ai/zen/go/v1
        # using the OPENCODE_GO_API_KEY from litellm-provider-keys secret.
        - model_name: kimi-k3-go
          litellm_params:
            model: openai/kimi-k3
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: kimi-k2.7-code-go
          litellm_params:
            model: openai/kimi-k2.7-code
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: kimi-k2.6-go
          litellm_params:
            model: openai/kimi-k2.6
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: kimi-k2.5-go
          litellm_params:
            model: openai/kimi-k2.5
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: glm-5.2-go
          litellm_params:
            model: openai/glm-5.2
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: glm-5.1-go
          litellm_params:
            model: openai/glm-5.1
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: glm-5-go
          litellm_params:
            model: openai/glm-5
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: minimax-m3-go
          litellm_params:
            model: openai/minimax-m3
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: minimax-m2.7-go
          litellm_params:
            model: openai/minimax-m2.7
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: minimax-m2.5-go
          litellm_params:
            model: openai/minimax-m2.5
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: deepseek-v4-pro-go
          litellm_params:
            model: openai/deepseek-v4-pro
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: deepseek-v4-flash-go
          litellm_params:
            model: openai/deepseek-v4-flash
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: qwen3.7-max-go
          litellm_params:
            model: openai/qwen3.7-max
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: qwen3.7-plus-go
          litellm_params:
            model: openai/qwen3.7-plus
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: qwen3.6-plus-go
          litellm_params:
            model: openai/qwen3.6-plus
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: qwen3.5-plus-go
          litellm_params:
            model: openai/qwen3.5-plus
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: mimo-v2-pro-go
          litellm_params:
            model: openai/mimo-v2-pro
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: mimo-v2-omni-go
          litellm_params:
            model: openai/mimo-v2-omni
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: mimo-v2.5-pro-go
          litellm_params:
            model: openai/mimo-v2.5-pro
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: mimo-v2.5-go
          litellm_params:
            model: openai/mimo-v2.5
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: hy3-preview-go
          litellm_params:
            model: openai/hy3-preview
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"
        - model_name: grok-4.5-go
          litellm_params:
            model: openai/grok-4.5
            api_base: "https://opencode.ai/zen/go/v1"
            api_key: "os.environ/OPENCODE_GO_API_KEY"

      litellm_settings:
        callbacks:
          - "prometheus"
        require_auth_for_metrics_endpoint: false

      general_settings:
        # master_key is also supplied via env var from the secret
        master_key: "os.environ/PROXY_MASTER_KEY"
        database_url: "os.environ/DATABASE_URL"
        # Restrict UI to admins only; combined with no UI_USERNAME/UI_PASSWORD
        # this hides the local login form, leaving only the SSO button
        ui_access_mode: "admin_only"

    # The chart creates a proxyConfigMap by default; leave it on
    proxyConfigMap:
      create: true

    migrationJob:
      enabled: false

    service:
      type: ClusterIP
      port: 4000

    ingress:
      enabled: false

    # Prometheus scraping via ServiceMonitor
    serviceMonitor:
      enabled: true
      labels:
        release: prometheus-stack
      interval: 15s
      scrapeTimeout: 10s

    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi

    livenessProbe:
      path: /health/liveliness
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

    readinessProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 3

    startupProbe:
      path: /health/readiness
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 30

    # Pass the provider-key secret into the pod as environment variables too
    environmentSecrets:
      - litellm-provider-keys

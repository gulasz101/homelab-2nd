---
# Hourly scheduled base backups for the Open WebUI CNPG cluster
# Uses the Barman Cloud CNPG-I plugin.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: openwebui-db-hourly
  namespace: llm-hub
spec:
  schedule: "0 * * * *"
  backupOwnerReference: self
  cluster:
    name: openwebui-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true

---
# Open WebUI Postgres cluster — single instance on local-path NVMe
# Backups + WAL archiving via the Barman Cloud CNPG-I plugin to OMV MinIO
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: openwebui-db
  namespace: llm-hub
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
    extensions:
      - name: pgvector
        image:
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.3-18-trixie

  bootstrap:
    initdb:
      database: openwebui
      owner: openwebui
      secret:
        name: openwebui-db-credentials
      postInitTemplateSQLRefs:
        configMapRefs:
          - name: openwebui-db-init-scripts
            key: init-template.sql

  storage:
    storageClass: local-path
    size: 10Gi

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: openwebui-db-backups
        serverName: openwebui-db

  backup:
    retentionPolicy: "30d"

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

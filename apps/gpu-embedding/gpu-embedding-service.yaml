---
# Short alias service so callers can use gpu-embedding.gpu-embedding.svc.cluster.local.
apiVersion: v1
kind: Service
metadata:
  name: gpu-embedding
  namespace: gpu-embedding
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama-embeddings
  ports:
    - name: http
      port: 11434
      targetPort: http
      protocol: TCP

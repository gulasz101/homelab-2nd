---
# Text Embeddings Inference (TEI) GPU deployment.
# - Serves nomic-ai/nomic-embed-text-v1.5 on the GTX 970M.
# - OpenAI-compatible endpoint at /v1/embeddings on port 3000.
# - Internal ClusterIP only; no public ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-embedding-server
  namespace: gpu-embedding
  labels:
    app.kubernetes.io/name: tei-embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tei-embedding-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tei-embedding-server
    spec:
      # Only schedule on nodes with an NVIDIA GPU.
      # NOTE: TEI CPU image is used because Maxwell sm_52 is not supported by
      # upstream CUDA builds >=1.9. CPU inference is still far more stable than
      # the Ollama GPU hang and keeps the GPU free for other CUDA workloads.
      nodeSelector:
        feature.node.kubernetes.io/pci-10de.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          imagePullPolicy: IfNotPresent
          args:
            - --model-id
            - "nomic-ai/nomic-embed-text-v1.5"
            - --port
            - "3000"
            - --max-concurrent-requests
            - "128"
            - --max-batch-tokens
            - "8192"
            - --max-client-batch-size
            - "32"
            # Preserve the model name consumers already use (OpenAI-compatible).
            - --served-model-name
            - "nomic-embed-text"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HF_HOME
              value: "/data/.cache/huggingface"
            - name: MODEL_ID
              value: "nomic-ai/nomic-embed-text-v1.5"
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: model-cache
              mountPath: /data
          resources:
            requests:
              cpu: "2"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2.5Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: tei-model-cache

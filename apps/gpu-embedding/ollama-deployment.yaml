---
# GPU-accelerated Ollama embedding server.
# Runs in the shared gpu-embedding namespace so other services can reuse it.
# Uses the NVIDIA RuntimeClass and requests one nvidia.com/gpu.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-embeddings
  namespace: gpu-embedding
  labels:
    app.kubernetes.io/name: ollama-embeddings
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-embeddings
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-embeddings
    spec:
      # Use the NVIDIA container runtime so CUDA devices and driver libs are mounted.
      runtimeClassName: nvidia
      nodeSelector:
        feature.node.kubernetes.io/pci-10de.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.3.14
          # Only pull if the model manifest is missing. Avoid starting 'ollama serve'
          # in init because it can hang during Maxwell GPU detection and block startup.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MODEL_DIR="/root/.ollama/models/manifests/registry.ollama.ai/library/nomic-embed-text"
              if [ -f "${MODEL_DIR}/latest" ]; then
                echo "nomic-embed-text already present; skipping pull."
              else
                echo "Pulling nomic-embed-text..."
                ollama pull nomic-embed-text
                echo "Model pulled."
              fi
          env:
            - name: HOME
              value: "/root"
            # Force CPU-only for the pull operation so it never hangs on GPU detection.
            - name: CUDA_VISIBLE_DEVICES
              value: ""
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
      containers:
        - name: ollama
          image: ollama/ollama:0.3.14
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: HOME
              value: "/root"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 4Gi
              nvidia.com/gpu: 1
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models

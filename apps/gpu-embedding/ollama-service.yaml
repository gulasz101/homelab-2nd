---
# Internal service for the GPU Ollama embedding server.
# Consumers reach it at http://ollama-embeddings.gpu-embedding.svc.cluster.local:11434
apiVersion: v1
kind: Service
metadata:
  name: ollama-embeddings
  namespace: gpu-embedding
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama-embeddings
  ports:
    - name: http
      port: 11434
      targetPort: http
      protocol: TCP

# MinIO S3 Backend — runs on OMV (openmediavault.local, 192.168.1.180)
# NOT managed by Flux/k8s — this is infrastructure supporting the cluster.
# Docker Compose config; secrets in .env (gitignored, SOPS-encrypted backup in .env.sops)
#
# Data: /srv/dev-disk-by-uuid-72d4f282-7d7e-4dda-9df6-1b65f5b2b279/minio-data (932GB btrfs)
# API: http://openmediavault.local:9000
# Console: http://openmediavault.local:9001

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /srv/dev-disk-by-uuid-72d4f282-7d7e-4dda-9df6-1b65f5b2b279/minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

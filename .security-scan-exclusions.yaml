# Security scan exclusions for gulasz101/homelab-2nd
# These are upstream-chart or architectural defaults we cannot remove without
# breaking functionality. They are still reported in the "suppressed" section
# so they do not disappear silently.

# --- Upstream chart misconfigurations accepted by design ---
trivy_misconfig:
  ids:
    # Default security context in upstream Helm charts (kube-prometheus-stack,
    # OpenTelemetry, CNPG, etc.). Address by tuning values over time.
    - KSV-0118
    # Read-only root filesystem not set by upstream chart defaults.
    - KSV-0014
    # Host ports used by kube-prometheus-stack components (node-exporter, etc.)
    - KSV-0024

# --- CRD / schema gaps ---
kubeconform:
  # These groups lack schemas in the CRDs-catalog; their absence is expected.
  missing_schema_groups:
    - helm.toolkit.fluxcd.io
    - barmancloud.cnpg.io
    - cnpg.io
    - keda.sh
    - monitoring.coreos.com
    - grafana.integreatly.org
    - ingress-nginx.k8s.io

# --- kube-score noisy checks from upstream charts ---
kube_score:
  # We will address these over time by tightening Helm values; for now they
  # generate too much noise to be actionable every morning.
  suppress_ids:
    - container-security-context
    - pod-network-policy
    - container-resources
    - statefulset-has-poddisruptionbudget
    - deployment-has-poddisruptionbudget
    - replicaset-has-poddisruptionbudget

# --- Custom GitOps checks: accepted architecture decisions ---
custom:
  # hostPath required for nvidia-gpu-exporter to access host nvidia-smi and
  # NVIDIA libraries on a consumer Maxwell GPU (no DCGM support).
  hostpath_accepted:
    - file: infrastructure/observability/nvidia-gpu-exporter-helm-release.yaml
      reason: "Consumer Maxwell GPU requires host nvidia-smi / libnvidia-ml.so mounts"
  # privileged required for nvidia-gpu-exporter to access /dev/nvidia* devices.
  privileged_accepted:
    - file: infrastructure/observability/nvidia-gpu-exporter-helm-release.yaml
      reason: "Consumer Maxwell GPU requires privileged access to NVIDIA driver devices"
  # runAsUser: 0 required for OpenTelemetry Collector filelog receiver to read
  # root-owned container logs from /var/log/pods on the node.
  root_accepted:
    - file: infrastructure/observability/opentelemetry-collector-helm-release.yaml
      reason: "filelog receiver reads root-owned node log files"
